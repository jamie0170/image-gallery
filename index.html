<!DOCTYPE html>
<html>
<head>
    <title>My Image Gallery</title>
    <style>
        body {
            margin: 0;
            padding: 40px 24px;
            background: #f5f1e8;
            font-family: Georgia, 'Times New Roman', serif;
            color: #2f2a20;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin: 0 0 28px;
            color: #3a3123;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
        }

        .gallery img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            box-shadow: 0 6px 14px rgba(47, 42, 32, 0.12);
            background: #e8dfca;
        }

        .gallery img:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 18px rgba(47, 42, 32, 0.18);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(18, 15, 10, 0.92);
            z-index: 1000;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            box-sizing: border-box;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }

        .close-btn {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 44px;
            height: 44px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1.6rem;
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Social Media Posters</h1>
        <div class="gallery" id="gallery"></div>
    </div>

    <div class="modal" id="imageModal">
        <div class="modal-content">
            <button class="close-btn" id="closeModal" aria-label="Close image">&times;</button>
            <img id="modalImage" src="" alt="Project preview">
        </div>
    </div>

    <script>
        const gallery = document.getElementById('gallery');
        const modal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        const closeModal = document.getElementById('closeModal');

        async function loadImages() {
            try {
                const response = await fetch('./images.json');
                const images = await response.json();

                images.forEach((imagePath) => {
                    const safeImagePath = encodeURI(imagePath);
                    const img = document.createElement('img');
                    img.src = safeImagePath;
                    img.alt = imagePath.split('/').pop();
                    img.loading = 'lazy';
                    img.addEventListener('click', () => {
                        modalImage.src = safeImagePath;
                        modal.classList.add('show');
                    });
                    gallery.appendChild(img);
                });
            } catch (error) {
                gallery.innerHTML = '<p>Unable to load images right now.</p>';
                console.error(error);
            }
        }

        function closeImageModal() {
            modal.classList.remove('show');
        }

        closeModal.addEventListener('click', closeImageModal);

        modal.addEventListener('click', (event) => {
            if (event.target === modal) {
                closeImageModal();
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeImageModal();
            }
        });

        loadImages();
    </script>
</body>
</html>
